# Interview reminder crons (runs every 5 minutes; Vercel Hobby allows only daily crons).
# Step 1: 15m reminders via /api/cron/interview-reminders (Interview.reminder_15m_sent_at).
# Step 2: 1hr reminders via /api/cron/interview-reminders-1hr (Interview.reminder_1hr_sent_at).
# The 30m reminder is a separate flow: /api/cron/send-interview-reminders (uses Interview.reminderSentAt).
# Add repo secret: CRON_SECRET (same value as in Vercel env). Optionally set repo variable REMINDER_APP_URL.
name: Interview reminder cron

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  remind:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger 15m interview reminders
        env:
          APP_URL: ${{ vars.REMINDER_APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          base="${APP_URL:-https://riseandshinehrm.com}"
          if [ -z "$CRON_SECRET" ]; then
            echo "CRON_SECRET not set; skipping."
            exit 0
          fi
          curl -sf -X GET "$base/api/cron/interview-reminders" \
            -H "Authorization: Bearer $CRON_SECRET" \
            -H "Accept: application/json" || true

      - name: Trigger 1hr interview reminders
        env:
          APP_URL: ${{ vars.REMINDER_APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          base="${APP_URL:-https://riseandshinehrm.com}"
          if [ -z "$CRON_SECRET" ]; then
            echo "CRON_SECRET not set; skipping."
            exit 0
          fi
          curl -sf -X GET "$base/api/cron/interview-reminders-1hr" \
            -H "Authorization: Bearer $CRON_SECRET" \
            -H "Accept: application/json" || true
